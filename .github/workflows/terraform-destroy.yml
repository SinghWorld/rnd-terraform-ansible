name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "destroy" to confirm'
        required: true
        type: string
        default: ''

env:
  AWS_REGION: us-east-1

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: destroy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -upgrade

      - name: Confirm destroy
        if: github.event.inputs.confirmation != 'destroy'
        run: |
          echo "ERROR: Confirmation must be 'destroy'"
          exit 1

      - name: Inject password into userdata
        env:
          TF_VAR_winrm_password: ${{ secrets.TF_VAR_winrm_password }}
        run: |
          sed "s|REPLACE_WITH_YOUR_PASSWORD|${TF_VAR_winrm_password}|g" \
            terraform/spot-userdata.ps1 > terraform/spot-userdata.ps1.tmp
          mv terraform/spot-userdata.ps1.tmp terraform/spot-userdata.ps1

      - name: Terraform Destroy
        working-directory: terraform
        env:
          TF_INPUT: 0
          TF_VAR_winrm_password: ${{ secrets.TF_VAR_winrm_password }}
        run: terraform destroy -auto-approve -no-color

      - name: Restore original userdata
        run: git checkout terraform/spot-userdata.ps1

      - name: Comment on PR if applicable
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🗑️ Terraform destroy completed. All AWS resources have been terminated.'
            })