name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "destroy" to confirm'
        required: true
        type: string
        default: ''

env:
  AWS_REGION: us-east-1

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: destroy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -upgrade

      - name: Confirm destroy
        if: github.event.inputs.confirmation != 'destroy'
        run: |
          echo "ERROR: Confirmation must be 'destroy'"
          exit 1

      - name: Inject password into userdata
        env:
          TF_VAR_winrm_password: ${{ secrets.TF_VAR_winrm_password }}
        run: |
          sed "s|REPLACE_WITH_YOUR_PASSWORD|${TF_VAR_winrm_password}|g" \
            terraform/spot-userdata.ps1 > terraform/spot-userdata.ps1.tmp
          mv terraform/spot-userdata.ps1.tmp terraform/spot-userdata.ps1

      - name: Terraform Destroy
        working-directory: terraform
        env:
          TF_INPUT: 0
        run: terraform destroy -auto-approve -no-color

      - name: Restore original userdata
        run: git checkout terraform/spot-userdata.ps1

      - name: Delete S3 bucket contents
        env:
          BUCKET_NAME: ${{ secrets.TF_VAR_tf_state_bucket }}
        run: |
          if [ -n "$BUCKET_NAME" ]; then
            echo "Clearing S3 bucket: $BUCKET_NAME"
            aws s3 rm s3://$BUCKET_NAME --recursive || true
            aws s3api delete-object-lock-configuration --bucket $BUCKET_NAME 2>/dev/null || true
            aws s3api delete-bucket --bucket $BUCKET_NAME || true
            echo "S3 bucket deleted"
          fi

      - name: Delete OIDC Provider (optional cleanup)
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws iam delete-open-id-connect-provider \
            --open-id-connect-provider-arn "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com" \
            2>/dev/null || true
          aws iam delete-role --role-name github-actions-oidc-role 2>/dev/null || true
          echo "IAM cleanup complete"

      - name: Comment on PR if applicable
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🗑️ Terraform destroy completed. All AWS resources have been terminated.'
            })