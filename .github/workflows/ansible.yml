name: Ansible Playbook

on:
  workflow_dispatch:
    inputs:
      public_ip:
        description: 'EC2 Public IP to configure'
        required: true
        type: string
  repository_dispatch:
    types: [ansible-run]

env:
  AWS_REGION: us-east-1

jobs:
  ansible-run:
    name: Run Ansible Windows Setup
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for Windows to boot
        run: sleep 120

      - name: Download EC2 private key
        env:
          TF_VAR_tf_state_bucket: ${{ secrets.TF_VAR_tf_state_bucket }}
        run: |
          KEY_FILE="win-spot-key.pem"
          aws s3 cp s3://$TF_VAR_tf_state_bucket/$KEY_FILE . 2>/dev/null || echo "Key file not in S3"
          if [ -f "$KEY_FILE" ]; then chmod 600 "$KEY_FILE"; fi

      - name: Get Public IP
        id: ip
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "public_ip=${{ github.event.inputs.public_ip }}" >> $GITHUB_OUTPUT
          else
            echo "public_ip=${{ github.event.client_payload.public_ip }}" >> $GITHUB_OUTPUT
          fi

      - name: Update inventory with dynamic IP
        env:
          PUBLIC_IP: ${{ steps.ip.outputs.public_ip }}
        run: |
          # Replace TARGET_IP placeholder with the actual IP
          sed -i 's|TARGET_IP|'"${PUBLIC_IP}"'|g' ansible/inventory.ini
          cat ansible/inventory.ini

      - name: Verify WinRM connectivity
        env:
          PUBLIC_IP: ${{ steps.ip.outputs.public_ip }}
        run: |
          for i in {1..10}; do
            echo "Attempt $i: Testing WinRM on $PUBLIC_IP:5985..."
            if curl -s --connect-timeout 10 -o /dev/null http://${PUBLIC_IP}:5985/wsman; then
              echo "WinRM is responding!"
              exit 0
            fi
            sleep 30
          done
          echo "WinRM not ready yet, proceeding anyway..."

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          pip install ansible pywinrm

      - name: Verify WinRM before playbook
        env:
          PUBLIC_IP: ${{ steps.ip.outputs.public_ip }}
          TF_VAR_winrm_password: ${{ secrets.TF_VAR_winrm_password }}
        run: |
          echo "Verifying WinRM connectivity to ${PUBLIC_IP}..."
          ansible windows -i ansible/inventory.ini -m win_ping \
            -e "ansible_password=${TF_VAR_winrm_password}" \
            || echo "WinRM ping failed, but continuing..."

      - name: Run Ansible Playbook
        env:
          PUBLIC_IP: ${{ steps.ip.outputs.public_ip }}
          TF_VAR_winrm_password: ${{ secrets.TF_VAR_winrm_password }}
        run: |
          cd ansible
          ansible-playbook \
            -i inventory.ini \
            playbooks/windows_setup.yml \
            -e "ansible_password=${TF_VAR_winrm_password}" \
            --extra-vars "target_host=${PUBLIC_IP}"